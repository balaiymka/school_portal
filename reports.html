<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Есептер - Saryshagan Portal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
       <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* CSS СТИЛЬДЕРІ */
        :root {
            --primary-color: #3498db;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --bg-color: #f4f7f6;
            --dark-blue: #1a2a3a;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #2c3e50;
        }

        .reports-container {
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--dark-blue);
        }

        .btn-excel {
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-excel:hover {
            background-color: #219150;
            transform: translateY(-2px);
        }

        /* Статистика карталары */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            text-align: center;
            border-bottom: 5px solid var(--primary-color);
        }

        .stat-card:nth-child(2) { border-color: var(--warning-color); }
        .stat-card:nth-child(3) { border-color: var(--success-color); }

        .stat-card h3 {
            margin: 0;
            color: #7f8c8d;
            font-size: 16px;
            text-transform: uppercase;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: 800;
            margin: 15px 0;
            color: var(--dark-blue);
        }

        /* Кесте */
        .table-wrapper {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            padding: 15px;
            background: #f8f9fa;
            color: #7f8c8d;
            font-weight: 600;
            border-bottom: 2px solid #eee;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .badge-high { background: #e8f8f0; color: var(--success-color); }
        .badge-mid { background: #fef9e7; color: var(--warning-color); }

        tr:hover { background-color: #fbfcfc; }

    </style>
    <style>
    /* Бұрынғы стильдер өлік қалады */

    /* ===== МОБИЛЬДІ НҰСҚАСЫ ===== */
    @media (max-width: 768px) {
        .reports-container {
            padding: 10px;
            max-width: 100%;
        }

        .header {
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            align-items: flex-start;
        }

        .header h1 {
            font-size: 20px;
            gap: 8px;
        }

        .btn-excel {
            width: 100%;
            padding: 12px;
            justify-content: center;
        }

        .stats-grid {
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .stat-card {
            padding: 20px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 28px;
        }

        .stat-card h3 {
            font-size: 12px;
        }

        .stat-card small {
            font-size: 11px;
        }

        .table-wrapper {
            padding: 15px;
            border-radius: 12px;
            overflow-x: auto;
        }

        table {
            font-size: 12px;
            min-width: 100%;
        }

        th {
            padding: 10px 8px;
            font-size: 11px;
        }

        td {
            padding: 10px 8px;
            font-size: 12px;
        }

        .badge {
            padding: 4px 8px;
            font-size: 11px;
        }

        tr:hover {
            background-color: #fafbfc;
        }
    }

    @media (max-width: 480px) {
        .reports-container {
            padding: 8px;
        }

        .header {
            padding: 12px;
            gap: 12px;
        }

        .header h1 {
            font-size: 18px;
        }

        .btn-excel {
            padding: 10px;
            font-size: 12px;
            gap: 6px;
        }

        .stats-grid {
            gap: 12px;
        }

        .stat-card {
            padding: 15px;
        }

        .stat-card .number {
            font-size: 24px;
        }

        .table-wrapper {
            padding: 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            font-size: 11px;
        }

        th, td {
            padding: 8px 5px;
        }

        .badge {
            padding: 3px 6px;
            font-size: 10px;
        }
    }
</style>
</head>
<body>

    <div class="reports-container">
        <div class="header">
            <h1><i class="fa-solid fa-file-invoice-dollar"></i> Мектеп есептері</h1>
            <button class="btn-excel" onclick="exportToExcel()">
                <i class="fa-solid fa-file-excel"></i> Excel-ге жүктеу
            </button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Білім сапасы</h3>
                <div class="number">84.2%</div>
                <small style="color: var(--success-color)"><i class="fa-solid fa-arrow-up"></i> Өсім бар</small>
            </div>
            <div class="stat-card">
                <h3>Орташа үлгерім</h3>
                <div class="number">4.1</div>
                <small style="color: var(--warning-color)">Тұрақты</small>
            </div>
            <div class="stat-card">
                <h3>Қатысу көрсеткіші</h3>
                <div class="number">96%</div>
                <small style="color: var(--success-color)">Жоғары</small>
            </div>
        </div>

        <div class="table-wrapper">
            <h2>Сыныптардың тоқсандық көрсеткіші</h2>
            <table>
                <thead>
                    <tr>
                        <th>Сынып</th>
                        <th>Оқушы саны</th>
                        <th>Үздіктер</th>
                        <th>Екпінділер</th>
                        <th>Сапа %</th>
                        <th>Күйі</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // ДЕРЕКТЕР
        const schoolData = [
            { class: "11 А", count: 25, excellent: 12, good: 10, quality: 88 },
            { class: "11 Б", count: 22, excellent: 8, good: 12, quality: 90 },
            { class: "10 А", count: 28, excellent: 10, good: 15, quality: 89 },
            { class: "9 Ә", count: 20, excellent: 5, good: 8, quality: 65 },
            { class: "8 Б", count: 24, excellent: 7, good: 10, quality: 71 }
        ];

        // БЕТКЕ ШЫҒАРУ
        function renderTable() {
            const tbody = document.getElementById('reportTableBody');
            tbody.innerHTML = schoolData.map(item => `
                <tr>
                    <td><b>${item.class}</b></td>
                    <td>${item.count}</td>
                    <td>${item.excellent}</td>
                    <td>${item.good}</td>
                    <td>${item.quality}%</td>
                    <td>
                        <span class="badge ${item.quality > 80 ? 'badge-high' : 'badge-mid'}">
                            ${item.quality > 80 ? 'Жоғары' : 'Орташа'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        // EXCEL-ГЕ ЖҮКТЕУ
        function exportToExcel() {
            const dataForExcel = [
                ["Сынып", "Оқушы саны", "Үздіктер", "Екпінділер", "Сапа %"]
            ];

            schoolData.forEach(item => {
                dataForExcel.push([item.class, item.count, item.excellent, item.good, item.quality + "%"]);
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(dataForExcel);
            XLSX.utils.book_append_sheet(wb, ws, "Мектеп_Есебі");
            XLSX.writeFile(wb, "Saryshagan_Reports_2026.xlsx");
        }

        // Іске қосу
        window.onload = renderTable;
    </script>

</body>
</html>
